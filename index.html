<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Absensi Terpadu X TKJ 2</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --p: #6366f1; --a: #a855f7; --bg: #020617; --g: rgba(15, 23, 42, 0.7); }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: radial-gradient(circle at top right, #1e1b4b, #020617); color: #f8fafc; margin: 0; padding: 20px; }
        .container { max-width: 1300px; margin: 0 auto; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        header { text-align: center; padding: 40px; background: var(--g); backdrop-filter: blur(20px); border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 30px; }
        h1 { font-size: 2.5rem; margin: 0; background: linear-gradient(to right, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .control-panel { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: var(--g); padding: 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
        
        input[type="date"], select { background: #111827; color: white; border: 1px solid #374151; padding: 12px; border-radius: 12px; width: 100%; box-sizing: border-box; }
        
        .btn { padding: 12px; border-radius: 12px; border: none; cursor: pointer; font-weight: 700; transition: 0.3s; color: white; width: 100%; margin-top: 10px; }
        .btn-save { background: var(--p); }
        .btn-excel { background: #059669; }
        .btn:hover { opacity: 0.8; transform: translateY(-2px); }

        .table-container { background: var(--g); border-radius: 24px; border: 1px solid rgba(255,255,255,0.1); overflow: auto; max-height: 500px; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th { position: sticky; top: 0; background: #1e293b; padding: 15px; text-align: left; font-size: 0.8rem; letter-spacing: 1px; z-index: 10; }
        td { padding: 12px 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }

        .rekap-badge { padding: 4px 8px; border-radius: 6px; font-size: 0.7rem; font-weight: bold; }
        .h { background: #064e3b; color: #34d399; }
        .i { background: #1e3a8a; color: #60a5fa; }
        .s { background: #78350f; color: #fbbf24; }
        .a { background: #7f1d1d; color: #f87171; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>PRESENSI DIGITAL X TKJ 2</h1>
        <p style="color: #94a3b8;">Sistem Pencatatan Harian & Bulanan Otomatis</p>
    </header>

    <div class="control-panel">
        <div class="card">
            <h3>⚙️ Kontrol Harian</h3>
            <label>Pilih Tanggal:</label>
            <input type="date" id="absensiDate">
            <button onclick="saveDaily()" class="btn btn-save">💾 Simpan Absen Hari Ini</button>
        </div>
        <div class="card">
            <h3>📊 Rekap Bulanan</h3>
            <button onclick="exportFull()" class="btn btn-excel">📑 Download Rekap Lengkap (.xlsx)</button>
            <p id="totalInfo" style="font-size: 0.8rem; color: #94a3b8; margin-top: 10px;"></p>
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Nama Siswa</th>
                    <th>Status Hari Ini</th>
                    <th>Hadir</th>
                    <th>Izin</th>
                    <th>Sakit</th>
                    <th>Alpha</th>
                </tr>
            </thead>
            <tbody id="mainTable"></tbody>
        </table>
    </div>

    <div style="margin-top: 30px; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px;">
        <div class="card"><canvas id="dailyChart"></canvas></div>
        <div class="card"><canvas id="monthlyChart"></canvas></div>
    </div>
</div>

<script>
    const students = ["Adrian Wansman Sugi", "Afriyani Sholeha", "Alberto Bryan", "Azan Azhar M.", "Azria Nurfadilla", "Banu Arkana Mibras H.", "Bintang Hafizh Khadaffi", "Cakra Prayata N.", "Dava Trian Putra", "Eriel Riva Fahreza", "Fadly Irsyad Febrian", "Fahrido Hidayat", "Gilang Ardian Pratama", "Hafidz Ridho Nur Fadilla", "Hafizah Nur Afrilyani", "Haikal Putra Lesmana", "Harits Shilah Al'adhawi", "Izyan Ghaisani Prasetyo", "M. Syehan Sidik Latuconsina", "Maira Luna Hastari", "Malik Ahmad Al Ghazi S.", "Marcellinus Nathan Doni K.", "Mochamad Eryan Ferully", "Moh. Zidha Aminnulloh", "Muchamad Iqbal Kurniadi", "Muhammad Baihaqi A.", "Muhammad Al-Fiansyakh", "Muhammad Raihan Febriano", "Muhammad Reza Pratama", "Putri Indah Lestari", "Regita Irzaprilya Arbadya F.", "Reno Setiawan", "Samuel Cristian Sulayman", "Umar Rafa Setiawan", "Zaskia Salsabila", "Zidan Alkaisar", "Ziyan Rashif Priyandaru", "M. Kafi Rasydan"];

    // Inisialisasi Database Lokal
    let db = JSON.parse(localStorage.getItem('absensi_tkj2')) || {};
    document.getElementById('absensiDate').valueAsDate = new Date();

    function renderTable() {
        const table = document.getElementById('mainTable');
        table.innerHTML = '';
        
        students.forEach(name => {
            let stats = calculateStats(name);
            table.innerHTML += `
                <tr>
                    <td style="font-weight:600">${name}</td>
                    <td>
                        <select onchange="updateTemp('${name}', this.value)">
                            <option value="H">Hadir</option>
                            <option value="I">Izin</option>
                            <option value="S">Sakit</option>
                            <option value="A">Alpha</option>
                        </select>
                    </td>
                    <td><span class="rekap-badge h">${stats.H}</span></td>
                    <td><span class="rekap-badge i">${stats.I}</span></td>
                    <td><span class="rekap-badge s">${stats.S}</span></td>
                    <td><span class="rekap-badge a">${stats.A}</span></td>
                </tr>
            `;
        });
    }

    function calculateStats(name) {
        let h=0, i=0, s=0, a=0;
        Object.values(db).forEach(dayData => {
            if(dayData[name] === 'H') h++;
            if(dayData[name] === 'I') i++;
            if(dayData[name] === 'S') s++;
            if(dayData[name] === 'A') a++;
        });
        return {H:h, I:i, S:s, A:a};
    }

    let tempAbsen = {};
    function updateTemp(name, val) { tempAbsen[name] = val; }

    function saveDaily() {
        const date = document.getElementById('absensiDate').value;
        if(!date) return alert("Pilih tanggal dulu!");
        
        // Default semua Hadir jika tidak diubah
        students.forEach(n => { if(!tempAbsen[n]) tempAbsen[n] = 'H'; });
        
        db[date] = {...tempAbsen};
        localStorage.setItem('absensi_tkj2', JSON.stringify(db));
        alert("Data tanggal " + date + " berhasil disimpan!");
        renderTable();
        updateCharts();
    }

    function exportFull() {
        let exportData = students.map(name => {
            let s = calculateStats(name);
            return { "Nama Siswa": name, "Hadir": s.H, "Izin": s.I, "Sakit": s.S, "Alpha": s.A, "Total Hari": s.H+s.I+s.S+s.A };
        });
        const ws = XLSX.utils.json_to_sheet(exportData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Rekap Bulanan");
        XLSX.writeFile(wb, "Rekap_Bulanan_TKJ2.xlsx");
    }

    let dChart, mChart;
    function updateCharts() {
        const hArr = students.map(n => calculateStats(n).H);
        if(mChart) mChart.destroy();
        mChart = new Chart(document.getElementById('monthlyChart'), {
            type: 'line',
            data: { labels: students.map(n => n.split(' ')[0]), datasets: [{ label: 'Total Kehadiran', data: hArr, borderColor: '#a855f7', fill: true, backgroundColor: 'rgba(168, 85, 247, 0.1)' }] },
            options: { plugins: { title: { display: true, text: 'Grafik Keaktifan Siswa' } } }
        });
    }

    renderTable();
    updateCharts();
</script>
</body>
</html>
