<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X TKJ 2 - Digital Presence System</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --accent: #a855f7;
            --bg: #020617;
            --glass: rgba(15, 23, 42, 0.6);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, #020617);
            color: #f8fafc;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }

        .container { max-width: 1200px; margin: 0 auto; animation: slideUp 0.8s ease-out; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        header {
            text-align: center;
            padding: 50px 20px;
            background: var(--glass);
            backdrop-filter: blur(25px);
            border-radius: 30px;
            border: 1px solid var(--border);
            margin-bottom: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        h1 { 
            font-size: 3.5rem; 
            font-weight: 800; 
            margin: 0;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -2px;
        }

        .wali-kelas { color: #94a3b8; font-size: 1.1rem; margin-top: 10px; font-weight: 500; }

        .btn-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 40px;
        }

        .btn {
            padding: 16px;
            border-radius: 18px;
            border: 1px solid var(--border);
            cursor: pointer;
            font-weight: 700;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: white;
            text-transform: uppercase;
            font-size: 0.85rem;
        }

        .btn-excel { background: linear-gradient(45deg, #059669, #10b981); }
        .btn-sync { background: linear-gradient(45deg, #4f46e5, #7c3aed); }
        .btn:hover { transform: translateY(-5px) scale(1.02); box-shadow: 0 15px 30px rgba(99, 102, 241, 0.4); }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            border: 1px solid var(--border);
            padding: 15px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        table { width: 100%; border-collapse: collapse; }
        th { padding: 25px; text-align: left; color: #64748b; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; }
        td { padding: 18px 25px; border-bottom: 1px solid rgba(255, 255, 255, 0.03); }
        tr:hover { background: rgba(255, 255, 255, 0.03); border-radius: 15px; }

        .avatar {
            width: 55px; height: 55px; border-radius: 16px;
            background: linear-gradient(45deg, #1e293b, #0f172a);
            border: 2px solid var(--primary);
            object-fit: cover;
        }

        .student-info div { font-weight: 700; color: #f1f5f9; font-size: 1rem; }

        select {
            background: #111827; color: white; border: 1px solid #374151;
            padding: 10px; border-radius: 12px; cursor: pointer; font-weight: 600;
        }

        .charts-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 30px;
            margin-top: 50px;
        }

        .chart-card { background: var(--glass); padding: 35px; border-radius: 30px; border: 1px solid var(--border); }

        .btn-photo {
            background: rgba(255,255,255,0.05); color: #94a3b8;
            border: 1px dashed #475569; padding: 8px 15px; border-radius: 10px;
            font-size: 0.7rem; cursor: pointer; transition: 0.3s;
        }
        .btn-photo:hover { border-color: var(--primary); color: white; background: rgba(99, 102, 241, 0.1); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>DASHBOARD X TKJ 2</h1>
        <div class="wali-kelas">Wali Kelas: Engglin Angela Theresia Humbas, S. Kom</div>
    </header>

    <div class="btn-group">
        <button onclick="exportToExcel()" class="btn btn-excel">📥 Export Spreadsheet</button>
        <label for="importExcel" class="btn" style="background:#334155; cursor:pointer">📤 Import Excel</label>
        <input type="file" id="importExcel" hidden accept=".xlsx, .xls">
        <button onclick="updateCharts()" class="btn btn-sync">⚡ Sinkronisasi Analitik</button>
    </div>

    <div class="glass-card" style="overflow-x: auto;">
        <table>
            <thead>
                <tr>
                    <th>Profil</th>
                    <th>Identitas Siswa</th>
                    <th>Senin</th><th>Selasa</th><th>Rabu</th><th>Kamis</th><th>Jumat</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody id="studentTable"></tbody>
        </table>
    </div>

    <div class="charts-container">
        <div class="chart-card">
            <h3 style="text-align:center; color: var(--primary);">Visualisasi Kehadiran Mingguan</h3>
            <canvas id="weeklyChart"></canvas>
        </div>
        <div class="chart-card">
            <h3 style="text-align:center; color: var(--accent);">Rasio Partisipasi Kelas</h3>
            <canvas id="pieChart"></canvas>
        </div>
    </div>
</div>

<script>
    const students = ["Adrian Wansman Sugi", "Afriyani Sholeha", "Alberto Bryan", "Azan Azhar M.", "Azria Nurfadilla", "Banu Arkana Mibras H.", "Bintang Hafizh Khadaffi", "Cakra Prayata N.", "Dava Trian Putra", "Eriel Riva Fahreza", "Fadly Irsyad Febrian", "Fahrido Hidayat", "Gilang Ardian Pratama", "Hafidz Ridho Nur Fadilla", "Hafizah Nur Afrilyani", "Haikal Putra Lesmana", "Harits Shilah Al'adhawi", "Izyan Ghaisani Prasetyo", "M. Syehan Sidik Latuconsina", "Maira Luna Hastari", "Malik Ahmad Al Ghazi S.", "Marcellinus Nathan Doni K.", "Mochamad Eryan Ferully", "Moh. Zidha Aminnulloh", "Muchamad Iqbal Kurniadi", "Muhammad Baihaqi A.", "Muhammad Al-Fiansyakh", "Muhammad Raihan Febriano", "Muhammad Reza Pratama", "Putri Intah Lestari", "Regita Irzaprilya Arbadya F.", "Reno Setiawan", "Samuel Cristian Sulayman", "Umar Rafa Setiawan", "Zaskia Salsabila", "Zidan Alkaisar", "Ziyan Rashif Priyandaru", "M. Kafi Rasydan"];

    const tbody = document.getElementById('studentTable');
    students.forEach((name, i) => {
        tbody.innerHTML += `
            <tr>
                <td><img src="https://api.dicebear.com/7.x/avataaars/svg?seed=${name}" class="avatar" id="img-${i}"></td>
                <td class="student-info"><div>${name}</div><small style="color:#64748b">ID: 2026-TKJ2-${i+1}</small></td>
                ${['Senin','Selasa','Rabu','Kamis','Jumat'].map(d => `<td>
                    <select class="status-sel" data-day="${d}">
                        <option value="H">HADIR</option>
                        <option value="I">IZIN</option>
                        <option value="S">SAKIT</option>
                        <option value="A">ALPHA</option>
                    </select>
                </td>`).join('')}
                <td>
                    <input type="file" id="f-${i}" hidden onchange="pv(${i}, event)">
                    <button class="btn-photo" onclick="document.getElementById('f-${i}').click()">FOTO</button>
                </td>
            </tr>
        `;
    });

    function pv(i, e) {
        const r = new FileReader();
        r.onload = () => document.getElementById(`img-${i}`).src = r.result;
        r.readAsDataURL(e.target.files[0]);
    }

    let wc, pc;
    function updateCharts() {
        const s = document.querySelectorAll('.status-sel');
        let dStats = {Senin:0, Selasa:0, Rabu:0, Kamis:0, Jumat:0}, h=0, th=0;
        s.forEach(sel => { if(sel.value==='H') { dStats[sel.dataset.day]++; h++; } else th++; });

        if(wc) wc.destroy();
        wc = new Chart(document.getElementById('weeklyChart'), {
            type: 'bar',
            data: { labels: Object.keys(dStats), datasets: [{ label: 'Kehadiran', data: Object.values(dStats), backgroundColor: '#818cf8', borderRadius: 12 }] },
            options: { plugins: { legend: { display: false } }, scales: { y: { grid: { display: false }, ticks: { color: '#64748b' } }, x: { ticks: { color: '#64748b' } } } }
        });

        if(pc) pc.destroy();
        pc = new Chart(document.getElementById('pieChart'), {
            type: 'doughnut',
            data: { labels: ['Hadir', 'Absen'], datasets: [{ data: [h, th], backgroundColor: ['#10b981', '#f43f5e'], borderWidth: 0 }] },
            options: { cutout: '80%', plugins: { legend: { position: 'bottom', labels: { color: '#94a3b8', font: { size: 14 } } } } }
        });
    }

    function exportToExcel() { XLSX.writeFile(XLSX.utils.table_to_book(document.querySelector("table")), "REKAP_PRESENSI_TKJ2.xlsx"); }
    updateCharts();
</script>
</body>
</html>
