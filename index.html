<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Absensi X TKJ 2</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --accent: #f43f5e;
            --bg: #030712;
            --glass: rgba(17, 24, 39, 0.7);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at 0% 0%, #1e1b4b 0%, #030712 100%);
            color: #f8fafc;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        .container { max-width: 1200px; margin: 0 auto; animation: fadeIn 0.8s ease-out; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        header {
            text-align: center;
            padding: 40px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid var(--border);
            margin-bottom: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 { 
            font-size: 3rem; 
            font-weight: 800; 
            margin: 0;
            background: linear-gradient(to right, #818cf8, #c084fc, #fb7185);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .action-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .btn {
            padding: 14px;
            border-radius: 16px;
            border: 1px solid var(--border);
            cursor: pointer;
            font-weight: 700;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        .btn-export { background: #059669; color: white; }
        .btn-update { background: var(--primary); color: white; }
        .btn-import { background: #4b5563; color: white; }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.5); }

        .table-wrapper {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid var(--border);
            padding: 10px;
            overflow: hidden;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }

        table { width: 100%; border-collapse: collapse; }
        th { padding: 20px; text-align: left; color: #94a3b8; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; border-bottom: 1px solid var(--border); }
        td { padding: 16px 20px; border-bottom: 1px solid rgba(255, 255, 255, 0.03); }
        tr:hover { background: rgba(255, 255, 255, 0.02); }

        .student-name { font-weight: 600; color: #e2e8f0; }
        .status-pill {
            background: #1f2937;
            color: #fff;
            border: 1px solid #374151;
            padding: 8px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
        }

        .avatar-box {
            width: 50px;
            height: 50px;
            border-radius: 14px;
            background: linear-gradient(45deg, #374151, #111827);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 2px solid var(--border);
        }

        .avatar-box img { width: 100%; height: 100%; object-fit: cover; }

        .chart-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 25px;
            margin-top: 40px;
        }

        .card {
            background: var(--glass);
            padding: 30px;
            border-radius: 24px;
            border: 1px solid var(--border);
        }

        .photo-trigger {
            background: rgba(255,255,255,0.05);
            border: 1px dashed rgba(255,255,255,0.2);
            color: #94a3b8;
            padding: 5px 10px;
            border-radius: 8px;
            font-size: 0.7rem;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>X TKJ 2 DASHBOARD</h1>
        <p style="color: #94a3b8; margin-top: 10px; font-weight: 500;">WALI KELAS: <span style="color: #c084fc;">ENGGLIN ANGELA THERESIA HUMBAS, S. KOM</span></p>
    </header>

    <div class="action-grid">
        <button onclick="exportToExcel()" class="btn btn-export">🚀 Export Spreadsheet</button>
        <label for="importExcel" class="btn btn-import">📁 Import Excel</label>
        <input type="file" id="importExcel" hidden accept=".xlsx, .xls">
        <button onclick="updateCharts()" class="btn btn-update">📊 Sinkronisasi Data</button>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>Profil</th>
                    <th>Nama Lengkap</th>
                    <th>Senin</th><th>Selasa</th><th>Rabu</th><th>Kamis</th><th>Jumat</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody id="studentTable"></tbody>
        </table>
    </div>

    <div class="chart-grid">
        <div class="card">
            <h3 style="margin-bottom: 20px;">Kehadiran Harian (Siswa)</h3>
            <canvas id="weeklyChart"></canvas>
        </div>
        <div class="card">
            <h3 style="margin-bottom: 20px;">Analisis Persentase (%)</h3>
            <canvas id="pieChart"></canvas>
        </div>
    </div>
</div>

<script>
    const students = ["Adrian Wansman Sugi", "Afriyani Sholeha", "Alberto Bryan", "Azan Azhar M.", "Azria Nurfadilla", "Banu Arkana Mibras H.", "Bintang Hafizh Khadaffi", "Cakra Prayata N.", "Dava Trian Putra", "Eriel Riva Fahreza", "Fadly Irsyad Febrian", "Fahrido Hidayat", "Gilang Ardian Pratama", "Hafidz Ridho Nur Fadilla", "Hafizah Nur Afrilyani", "Haikal Putra Lesmana", "Harits Shilah Al'adhawi", "Izyan Ghaisani Prasetyo", "M. Syehan Sidik Latuconsina", "Maira Luna Hastari", "Malik Ahmad Al Ghazi S.", "Marcellinus Nathan Doni K.", "Mochamad Eryan Ferully", "Moh. Zidha Aminnulloh", "Muchamad Iqbal Kurniadi", "Muhammad Baihaqi A.", "Muhammad Al-Fiansyakh", "Muhammad Raihan Febriano", "Muhammad Reza Pratama", "Putri Indah Lestari", "Regita Irzaprilya Arbadya F.", "Reno Setiawan", "Samuel Cristian Sulayman", "Umar Rafa Setiawan", "Zaskia Salsabila", "Zidan Alkaisar", "Ziyan Rashif Priyandaru", "M. Kafi Rasydan"];
    
    const tableBody = document.getElementById('studentTable');
    students.forEach((name, i) => {
        tableBody.innerHTML += `
            <tr>
                <td><div class="avatar-box"><img src="https://api.dicebear.com/7.x/avataaars/svg?seed=${name}" id="img-${i}"></div></td>
                <td><div class="student-name">${name}</div></td>
                ${['Senin','Selasa','Rabu','Kamis','Jumat'].map(d => `<td>
                    <select class="status-pill" data-day="${d}">
                        <option value="H">HADIR</option>
                        <option value="I">IZIN</option>
                        <option value="S">SAKIT</option>
                        <option value="A">ALPHA</option>
                    </select>
                </td>`).join('')}
                <td>
                    <input type="file" id="file-${i}" hidden onchange="preview(${i}, event)">
                    <button class="photo-trigger" onclick="document.getElementById('file-${i}').click()">GANTI FOTO</button>
                </td>
            </tr>
        `;
    });

    function preview(i, e) {
        const r = new FileReader();
        r.onload = () => document.getElementById(`img-${i}`).src = r.result;
        r.readAsDataURL(e.target.files[0]);
    }

    let wc, pc;
    function updateCharts() {
