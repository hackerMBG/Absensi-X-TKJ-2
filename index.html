<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absensi Digital X TKJ 2 - SMK YADIKA 13</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --bg: #0f172a;
            --card: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top left, #1e1b4b, #0f172a);
            color: var(--text);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        .container { max-width: 1100px; margin: 0 auto; }

        header {
            text-align: center;
            padding: 30px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 30px;
        }

        h1 { margin: 0; background: linear-gradient(to right, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p.wali-kelas { font-weight: 300; opacity: 0.8; }

        .action-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button, .file-label {
            padding: 10px 20px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            background: var(--primary);
            color: white;
        }

        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(99, 102, 241, 0.4); }
        .btn-excel { background: #166534; }

        .glass-table-container {
            background: var(--card);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 30px;
        }

        table { width: 100%; border-collapse: collapse; }
        th { background: rgba(255, 255, 255, 0.05); padding: 15px; text-align: left; }
        td { padding: 12px 15px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }

        .status-select {
            background: #1e293b;
            color: white;
            border: 1px solid #475569;
            padding: 5px;
            border-radius: 5px;
        }

        .img-preview { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; background: #334155; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .chart-card { background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>ABSENSI DIGITAL X TKJ 2</h1>
        <p>SMK YADIKA 13 TAMBUN SELATAN</p>
        <p class="wali-kelas">Wali Kelas: <strong>Engglin Angela Theresia Humbas, S. Kom</strong></p>
    </header>

    <div class="action-bar">
        <button onclick="exportToExcel()" class="btn-excel">📤 Export Excel</button>
        <input type="file" id="importExcel" hidden accept=".xlsx, .xls">
        <label for="importExcel" class="file-label" style="background:#334155">📥 Import Excel</label>
        <button onclick="updateCharts()" style="background:#f59e0b">🔄 Update Grafik</button>
    </div>

    <div class="glass-table-container">
        <table>
            <thead>
                <tr>
                    <th>Foto</th>
                    <th>Nama Siswa</th>
                    <th>Senin</th>
                    <th>Selasa</th>
                    <th>Rabu</th>
                    <th>Kamis</th>
                    <th>Jumat</th>
                    <th>Aksi Foto</th>
                </tr>
            </thead>
            <tbody id="studentTable">
                </tbody>
        </table>
    </div>

    <div class="stats-grid">
        <div class="chart-card">
            <h3 style="text-align: center;">Perbandingan Kehadiran Per Hari</h3>
            <canvas id="weeklyChart"></canvas>
        </div>
        <div class="chart-card">
            <h3 style="text-align: center;">Persentase Total Kehadiran</h3>
            <canvas id="pieChart"></canvas>
        </div>
    </div>
</div>

<script>
    const students = [
        "Adrian Wansman Sugi", "Afriyani Sholeha", "Alberto Bryan", "Azan Azhar M.", "Azria Nurfadilla",
        "Banu Arkana Mibras H.", "Bintang Hafizh Khadaffi", "Cakra Prayata N.", "Dava Trian Putra",
        "Eriel Riva Fahreza", "Fadly Irsyad Febrian", "Fahrido Hidayat", "Gilang Ardian Pratama",
        "Hafidz Ridho Nur Fadilla", "Hafizah Nur Afrilyani", "Haikal Putra Lesmana", "Harits Shilah Al'adhawi",
        "Izyan Ghaisani Prasetyo", "M. Syehan Sidik Latuconsina", "Maira Luna Hastari", "Malik Ahmad Al Ghazi S.",
        "Marcellinus Nathan Doni K.", "Mochamad Eryan Ferully", "Moh. Zidha Aminnulloh", "Muchamad Iqbal Kurniadi",
        "Muhammad Baihaqi A.", "Muhammad Al-Fiansyakh", "Muhammad Raihan Febriano", "Muhammad Reza Pratama",
        "Putri Indah Lestari", "Regita Irzaprilya Arbadya F.", "Reno Setiawan", "Samuel Cristian Sulayman",
        "Umar Rafa Setiawan", "Zaskia Salsabila", "Zidan Alkaisar", "Ziyan Rashif Priyandaru", "M. Kafi Rasydan"
    ];

    const days = ['Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat'];
    const tableBody = document.getElementById('studentTable');

    // Populate Table
    students.forEach((name, index) => {
        let row = `<tr>
            <td><img src="https://via.placeholder.com/40" id="img-${index}" class="img-preview"></td>
            <td>${name}</td>
            ${days.map(day => `<td>
                <select class="status-select" data-student="${index}" data-day="${day}">
                    <option value="H">Hadir</option>
                    <option value="I">Izin</option>
                    <option value="S">Sakit</option>
                    <option value="A">Alpha</option>
                </select>
            </td>`).join('')}
            <td>
                <input type="file" id="file-${index}" hidden onchange="previewImage(event, ${index})">
                <button class="photo-btn" onclick="document.getElementById('file-${index}').click()">📸 Foto</button>
            </td>
        </tr>`;
        tableBody.innerHTML += row;
    });

    function previewImage(event, index) {
        const reader = new FileReader();
        reader.onload = function() {
            document.getElementById(`img-${index}`).src = reader.result;
        }
        reader.readAsDataURL(event.target.files[0]);
    }

    // Charting Logic
    let weeklyChart, pieChart;

    function updateCharts() {
        const selects = document.querySelectorAll('.status-select');
        let dailyStats = { Senin: 0, Selasa: 0, Rabu: 0, Kamis: 0, Jumat: 0 };
        let totals = { Hadir: 0, TidakHadir: 0 };

        selects.forEach(sel => {
            if(sel.value === 'H') {
                dailyStats[sel.dataset.day]++;
                totals.Hadir++;
            } else {
                totals.TidakHadir++;
            }
        });

        const ctx1 = document.getElementById('weeklyChart').getContext('2d');
        if(weeklyChart) weeklyChart.destroy();
        weeklyChart = new Chart(ctx1, {
            type: 'bar',
            data: {
                labels: days,
                datasets: [{
                    label: 'Jumlah Siswa Hadir',
                    data: days.map(d => dailyStats[d]),
                    backgroundColor: '#6366f1'
                }]
            },
            options: { scales: { y: { beginAtZero: true, max: students.length } } }
        });

        const ctx2 = document.getElementById('pieChart').getContext('2d');
        if(pieChart) pieChart.destroy();
        pieChart = new Chart(ctx2, {
            type: 'doughnut',
            data: {
                labels: ['Hadir', 'Ketidakhadiran (S/I/A)'],
                datasets: [{
                    data: [totals.Hadir, totals.TidakHadir],
                    backgroundColor: ['#22c55e', '#ef4444']
                }]
            }
        });
    }

    function exportToExcel() {
        const table = document.querySelector("table");
        const wb = XLSX.utils.table_to_book(table);
        XLSX.writeFile(wb, "Absensi_TKJ2_Yadika13.xlsx");
    }

    document.getElementById('importExcel').addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = function(e) {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            alert('Data Excel berhasil dibaca! (Logika sinkronisasi data dapat dikembangkan lebih lanjut)');
        };
        reader.readAsArrayBuffer(e.target.files[0]);
    });

    // Initial Chart
    updateCharts();
</script>

</body>
</html>
