<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Presence System X TKJ 2</title>
    <script src="https://cdn.tailwindcss.com/3.4.1"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .active-tab { border-bottom: 4px solid #0d9488; color: #0d9488; }
        .status-h { background: #dcfce7; color: #166534; }
        .status-i { background: #fef9c3; color: #854d0e; }
        .status-s { background: #dbeafe; color: #1e40af; }
        .status-a { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen">

    <nav class="bg-slate-900 text-white p-4 sticky top-0 z-50 shadow-xl">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="font-800 text-xl tracking-tight">PRESENSI X TKJ 2</h1>
                <p class="text-xs text-teal-400 font-600">SMK YADIKA 13 - KELOMPOK DIGITAL</p>
            </div>
            <div class="text-right hidden sm:block">
                <p class="text-[10px] uppercase font-bold text-slate-400">Wali Kelas</p>
                <p class="text-xs font-bold">Engglin Angela T. H., S. Kom</p>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-4 sm:p-6">
        
        <div class="flex gap-4 mb-6 border-b border-slate-300 overflow-x-auto">
            <button onclick="switchTab('input')" id="btn-input" class="pb-3 px-4 font-bold text-sm active-tab transition-all">📥 Input Harian</button>
            <button onclick="switchTab('rekap')" id="btn-rekap" class="pb-3 px-4 font-bold text-sm text-slate-500 transition-all">📊 Rekap & Persentase</button>
            <button onclick="switchTab('analitik')" id="btn-analitik" class="pb-3 px-4 font-bold text-sm text-slate-500 transition-all">📈 Grafik Tren</button>
        </div>

        <section id="tab-input" class="space-y-6">
            <div class="flex flex-wrap gap-4 items-end justify-between bg-white p-4 rounded-2xl shadow-sm border border-slate-200">
                <div class="flex-1 min-w-[200px]">
                    <label class="text-[10px] font-bold text-slate-500 uppercase">Pilih Tanggal Absensi</label>
                    <input type="date" id="dateSelect" class="w-full p-2 bg-slate-50 border border-slate-300 rounded-lg font-bold">
                </div>
                <div class="flex gap-2">
                    <button onclick="markAll('H')" class="px-4 py-2 bg-emerald-600 text-white rounded-lg text-xs font-bold hover:bg-emerald-700 transition">Hadir Semua</button>
                    <button onclick="saveData()" class="px-6 py-2 bg-slate-900 text-white rounded-lg text-xs font-bold hover:bg-black transition shadow-lg">💾 Simpan Permanen</button>
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 border-b border-slate-200">
                        <tr>
                            <th class="p-4 text-xs font-800 text-slate-500 uppercase">Nama Siswa</th>
                            <th class="p-4 text-xs font-800 text-slate-500 uppercase text-center">Status Kehadiran</th>
                        </tr>
                    </thead>
                    <tbody id="studentList" class="divide-y divide-slate-100"></tbody>
                </table>
            </div>
        </section>

        <section id="tab-rekap" class="hidden space-y-6">
            <div class="grid grid-cols-2 sm:grid-cols-4 gap-4">
                <div class="bg-white p-4 rounded-2xl border-l-4 border-emerald-500 shadow-sm">
                    <p class="text-[10px] font-bold text-slate-500 uppercase">Total Hadir</p>
                    <p id="stat-h" class="text-2xl font-800">0</p>
                </div>
                <div class="bg-white p-4 rounded-2xl border-l-4 border-amber-500 shadow-sm">
                    <p class="text-[10px] font-bold text-slate-500 uppercase">Total Izin/Sakit</p>
                    <p id="stat-is" class="text-2xl font-800">0</p>
                </div>
                <div class="bg-white p-4 rounded-2xl border-l-4 border-red-500 shadow-sm">
                    <p class="text-[10px] font-bold text-slate-500 uppercase">Total Alpha</p>
                    <p id="stat-a" class="text-2xl font-800">0</p>
                </div>
                <div class="bg-white p-4 rounded-2xl border-l-4 border-blue-500 shadow-sm">
                    <p class="text-[10px] font-bold text-slate-500 uppercase">Rasio Kehadiran</p>
                    <p id="stat-pct" class="text-2xl font-800 text-blue-600">0%</p>
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-4">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-800 text-slate-800">Akumulasi Bulanan Siswa</h3>
                    <button onclick="downloadExcel()" class="text-xs font-bold text-emerald-600 border border-emerald-600 px-3 py-1 rounded-md hover:bg-emerald-50">📥 Export Excel</button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-sm">
                        <thead>
                            <tr class="text-left text-slate-400 font-bold border-b">
                                <td class="pb-2">Nama</td>
                                <td class="pb-2">H</td><td class="pb-2">I</td><td class="pb-2">S</td><td class="pb-2">A</td>
                                <td class="pb-2">Persentase</td>
                            </tr>
                        </thead>
                        <tbody id="rekapList" class="divide-y divide-slate-100"></tbody>
                    </table>
                </div>
            </div>
        </section>

        <section id="tab-analitik" class="hidden">
            <div class="grid sm:grid-cols-2 gap-6">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <h3 class="font-800 mb-4">Komposisi Harian</h3>
                    <canvas id="chartDoughnut"></canvas>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <h3 class="font-800 mb-4">Tren Kehadiran (7 Hari Terakhir)</h3>
                    <canvas id="chartLine"></canvas>
                </div>
            </div>
        </section>

    </main>

    <script>
        const siswa = ["Adrian Wansman Sugi", "Afriyani Sholeha", "Alberto Bryan", "Azan Azhar M.", "Azria Nurfadilla", "Banu Arkana Mibras H.", "Bintang Hafizh Khadaffi", "Cakra Prayata N.", "Dava Trian Putra", "Eriel Riva Fahreza", "Fadly Irsyad Febrian", "Fahrido Hidayat", "Gilang Ardian Pratama", "Hafidz Ridho Nur Fadilla", "Hafizah Nur Afrilyani", "Haikal Putra Lesmana", "Harits Shilah Al'adhawi", "Izyan Ghaisani Prasetyo", "M. Syehan Sidik Latuconsina", "Maira Luna Hastari", "Malik Ahmad Al Ghazi S.", "Marcellinus Nathan Doni K.", "Mochamad Eryan Ferully", "Moh. Zidha Aminnulloh", "Muchamad Iqbal Kurniadi", "Muhammad Baihaqi A.", "Muhammad Al-Fiansyakh", "Muhammad Raihan Febriano", "Muhammad Reza Pratama", "Putri Indah Lestari", "Regita Irzaprilya Arbadya F.", "Reno Setiawan", "Samuel Cristian Sulayman", "Umar Rafa Setiawan", "Zaskia Salsabila", "Zidan Alkaisar", "Ziyan Rashif Priyandaru", "M. Kafi Rasydan"];

        let db = JSON.parse(localStorage.getItem('absensi_v5_db')) || {};
        document.getElementById('dateSelect').valueAsDate = new Date();

        function switchTab(target) {
            ['input', 'rekap', 'analitik'].forEach(t => {
                document.getElementById('tab-'+t).classList.add('hidden');
                document.getElementById('btn-'+t).classList.remove('active-tab');
                document.getElementById('btn-'+t).classList.add('text-slate-500');
            });
            document.getElementById('tab-'+target).classList.remove('hidden');
            document.getElementById('btn-'+target).classList.add('active-tab');
            if(target === 'rekap') updateRekap();
            if(target === 'analitik') updateCharts();
        }

        function renderInput() {
            const container = document.getElementById('studentList');
            container.innerHTML = siswa.map(name => `
                <tr class="hover:bg-slate-50">
                    <td class="p-4 font-bold text-slate-700 text-sm">${name}</td>
                    <td class="p-4 flex justify-center gap-2">
                        ${['H', 'I', 'S', 'A'].map(status => `
                            <button onclick="setTemp('${name}', '${status}')" id="btn-${name}-${status}" 
                                class="w-8 h-8 rounded-full border border-slate-200 font-bold text-[10px] hover:border-slate-400 transition status-off">
                                ${status}
                            </button>
                        `).join('')}
                    </td>
                </tr>
            `).join('');
        }

        let tempInput = {};
        function setTemp(name, status) {
            ['H', 'I', 'S', 'A'].forEach(s => {
                document.getElementById(`btn-${name}-${s}`).className = 'w-8 h-8 rounded-full border border-slate-200 font-bold text-[10px] status-off';
            });
            document.getElementById(`btn-${name}-${status}`).className = `w-8 h-8 rounded-full font-bold text-[10px] status-${status.toLowerCase()} shadow-lg scale-110`;
            tempInput[name] = status;
        }

        function markAll(status) {
            siswa.forEach(name => setTemp(name, status));
        }

        function saveData() {
            const date = document.getElementById('dateSelect').value;
            siswa.forEach(n => { if(!tempInput[n]) tempInput[n] = 'H'; });
            db[date] = {...tempInput};
            localStorage.setItem('absensi_v5_db', JSON.stringify(db));
            alert('Data Tanggal ' + date + ' Tersimpan!');
        }

        function updateRekap() {
            const container = document.getElementById('rekapList');
            let globalStats = {H:0, I:0, S:0, A:0};
            const totalDays = Object.keys(db).length;

            container.innerHTML = siswa.map(name => {
                let s = {H:0, I:0, S:0, A:0};
                Object.values(db).forEach(day => { if(day[name]) s[day[name]]++; globalStats[day[name]]++; });
                let pct = totalDays > 0 ? ((s.H / totalDays) * 100).toFixed(1) : 0;
                
                return `<tr>
                    <td class="py-3 font-bold">${name}</td>
                    <td>${s.H}</td><td>${s.I}</td><td>${s.S}</td><td class="text-red-500 font-bold">${s.A}</td>
                    <td><span class="bg-blue-100 text-blue-700 px-2 py-1 rounded-full text-[10px] font-bold">${pct}%</span></td>
                </tr>`;
            }).join('');

            document.getElementById('stat-h').innerText = globalStats.H;
            document.getElementById('stat-is').innerText = globalStats.I + globalStats.S;
            document.getElementById('stat-a').innerText = globalStats.A;
            document.getElementById('stat-pct').innerText = totalDays > 0 ? ((globalStats.H / (siswa.length * totalDays)) * 100).toFixed(1) + '%' : '0%';
        }

        let dChart, lChart;
        function updateCharts() {
            const dates = Object.keys(db).sort().slice(-7);
            const dataH = dates.map(d => Object.values(db[d]).filter(v => v === 'H').length);

            if(dChart) dChart.destroy();
            dChart = new Chart(document.getElementById('chartDoughnut'), {
                type: 'doughnut',
                data: {
                    labels: ['Hadir', 'Izin', 'Sakit', 'Alpha'],
                    datasets: [{
                        data: [
                            parseInt(document.getElementById('stat-h').innerText),
                            parseInt(document.getElementById('stat-is').innerText),
                            0, // Sakit (bisa dipisah di rekap jika mau)
                            parseInt(document.getElementById('stat-a').innerText)
                        ],
                        backgroundColor: ['#10b981', '#f59e0b', '#3b82f6', '#ef4444']
                    }]
                }
            });

            if(lChart) lChart.destroy();
            lChart = new Chart(document.getElementById('chartLine'), {
                type: 'line',
                data: {
                    labels: dates,
                    datasets: [{ label: 'Jumlah Siswa Hadir', data: dataH, borderColor: '#0d9488', tension: 0.3, fill: true, backgroundColor: 'rgba(13, 148, 136, 0.1)' }]
                }
            });
        }

        function downloadExcel() {
            const rows = siswa.map(name => {
                let s = {H:0, I:0, S:0, A:0};
                Object.values(db).forEach(day => { if(day[name]) s[day[name]]++; });
                return { Nama: name, Hadir: s.H, Izin: s.I, Sakit: s.S, Alpha: s.A, Persentase: ((s.H/Object.keys(db).length)*100).toFixed(1)+'%' };
            });
            const ws = XLSX.utils.json_to_sheet(rows);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Rekap_TKJ2");
            XLSX.writeFile(wb, "Rekap_Absensi_TKJ2_Final.xlsx");
        }

        renderInput();
    </script>
</body>
</html>
